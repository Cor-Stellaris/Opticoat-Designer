    <circle cx="0" cy="0" r="55" fill="none" stroke="#5060D8" stroke-width="10" opacity="0.55"/>
    <circle cx="0" cy="0" r="51" fill="none" stroke="#5060D8" stroke-width="4" opacity="0.85"/>

