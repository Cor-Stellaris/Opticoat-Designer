    <circle cx="0" cy="0" r="39" fill="none" stroke="#7858C8" stroke-width="10" opacity="0.55"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#7858C8" stroke-width="4" opacity="0.85"/>

    <!-- Deep violet core -->
